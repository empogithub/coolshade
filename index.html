<style>

.btn {

    padding: 14px 20px;
    background: #111;
    color: white;
    border: none;
    cursor: pointer;
    font-weight: bold;
    text-transform: uppercase;
}

.btn:hover {
    background: #333;
}

.section {
    padding: 60px 25px;
    border-bottom: 2px solid #111;
    background: #f4f4f4;
}

.section h2 {
    font-size: 28px;
    margin-bottom: 20px;
    text-transform: uppercase;

.features {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));

.feature {
    background: white;
    border: 2px solid #111;

}

.floating {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #111;
    color: white;
    padding: 14px 18px;
    border: none;
    cursor: pointer;
    font-weight: bold;
}

footer {
    padding: 40px;
    text-align: center;
    font-weight: bold;
    background: white;
    border-top: 2px solid #111;
}

/* BEFORE AFTER */
.before-after-wrapper {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 15px;
}

.before-after-container {
    background: white;
    border: 2px solid #111;
    overflow: hidden;
}

.before-after {
    position: relative;
    height: 220px;
    user-select: none;
    touch-action: none;
    cursor: ew-resize;
}

.before,
.after {
    position: absolute;
    inset: 0;
}

.before img,
.after img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.after {
    clip-path: inset(0 50% 0 0);
}

.slider-line {
    position: absolute;
    top: 0;
    left: 50%;
    width: 3px;
    height: 100%;
    background: #fff;
    transform: translateX(-50%);
}
</style>

<body>

<header>

    <button class="btn" onclick="download()">Download</button>
</section>

<section class="section" id="compare">
    <h2>Comparisons</h2>

    <div class="before-after-wrapper">

        <div class="before-after-container">
            <div class="before-after">
                <div class="before">
                    <img src="https://cdn.nest.rip/uploads/112a7b81-3f02-4846-90ca-2575e61f3d9b.jpg">
                </div>

                    <img src="https://cdn.nest.rip/uploads/7530b122-927d-4dd7-90de-151013b11792.png">
                </div>
                <div class="slider-line"></div>
            </div>
        </div>

    </div>
</section>

<section class="section" id="features">

    <div class="features">

    </div>
</section>

</footer>

<button class="floating" onclick="download()">DOWNLOAD</button>

<script>
function download() {
    window.location.href = "http://adfoc.us/866895113106064";
}

/* slider */
let active = null;

document.querySelectorAll(".before-after").forEach(el => {
    el.addEventListener("mousedown", () => active = el);
    el.addEventListener("touchstart", () => active = el);
});

document.addEventListener("mouseup", () => active = null);
document.addEventListener("touchend", () => active = null);

document.addEventListener("mousemove", move);
document.addEventListener("touchmove", move);

function move(e) {
    if (!active) return;

    const rect = active.getBoundingClientRect();
    const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;

    let percent = (x / rect.width) * 100;
    percent = Math.max(0, Math.min(100, percent));

    active.querySelector(".after").style.clipPath =
        `inset(0 ${100 - percent}% 0 0)`;

    active.querySelector(".slider-line").style.left = percent + "%";
}
</script>

</body>
